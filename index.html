<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beachballers</title>
    <meta name="description" content="Turn-based duel-based roguelike beach soccer. Prototype V1.0." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div id="app">
      <!-- Background Layer -->
      <div id="game-bg"></div>

      <!-- Top Bar: Clock and Scores -->
      <header id="topbar">
        <div id="player-info-left" class="top-player-info"></div>
        
        <div class="score-center-wrap">
          <div class="score-block">
            <span class="team-name">Human</span>
            <span id="score-human" class="score-num">0</span>
          </div>
          <div id="match-meta">
            <div id="clock">00:00</div>
          </div>
          <div class="score-block">
            <span id="score-ai" class="score-num">0</span>
            <span class="team-name">AI</span>
          </div>
        </div>

        <div id="player-info-right" class="top-player-info"></div>
      </header>

      <!-- Main Game Area: The Duel Centerpiece -->
      <main id="arena">
        <div id="duel-scene">
          <div id="possession-ball" class="hidden">⚽</div>
          <!-- Human Side -->
          <div id="actor-human-group" class="actor-group">
            <div id="actor-human-gk" class="duel-actor secondary-preview hidden">
              <div class="portrait-wrap">
                <img src="" alt="GK" />
              </div>
              <div class="actor-info">
                <div class="actor-stats stat-grid"></div>
              </div>
            </div>
            <div id="actor-human" class="duel-actor">
              <div class="portrait-wrap">
                <img id="img-portrait-human" src="/human_player_portrait.png" alt="Human" />
                <div class="momentum-glow"></div>
              </div>
              <div class="actor-info">
                <h2 class="p-name">Marco</h2>
                <div class="actor-stats stat-grid">
                  <!-- Populated by JS -->
                </div>
              </div>
            </div>
          </div>

          <!-- Central Dilemma Display -->
          <div id="dilemma-container">
            <div id="dilemma-human" class="dilemma-side">
              <span id="dilemma-val-human" class="d-val">--</span>
              <span id="dilemma-label-human" class="d-label">Action</span>
            </div>
            <div id="vs-divider">VS</div>
            <div id="dilemma-ai" class="dilemma-side">
              <span id="dilemma-val-ai" class="d-val">--</span>
              <span id="dilemma-label-ai" class="d-label">Intent</span>
            </div>
          </div>

          <!-- AI Side -->
          <div id="actor-ai-group" class="actor-group">
            <div id="actor-ai" class="duel-actor">
              <div class="portrait-wrap">
                <img id="img-portrait-ai" src="/ai_player_portrait.png" alt="AI" />
                <div class="momentum-glow"></div>
              </div>
              <div class="actor-info">
                <h2 class="p-name">Reyes</h2>
                <div class="actor-stats stat-grid">
                  <!-- Populated by JS -->
                </div>
              </div>
            </div>
            <div id="actor-ai-gk" class="duel-actor secondary-preview hidden">
              <div class="portrait-wrap">
                <img src="" alt="GK" />
              </div>
              <div class="actor-info">
                <div class="actor-stats stat-grid"></div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Immersive Bottom Bar -->
      <footer id="immersive-footer">
        <div id="footer-left">
          <!-- Minimap now an absolute child of #app for better anchoring -->
        </div>

        <!-- 2. Move Carousel (Center) -->
        <div id="footer-center">
          <div id="tu-banner" class="hidden">
            <span class="tu-label">TOUCH UNITS</span>
            <span id="tu-active-val">0</span>
          </div>
          <div id="move-carousel"></div>
        </div>

        <!-- 3. Action Wheel (Bottom Right) -->
        <div id="footer-right">
          <div id="action-wheel">
            <div id="btn-group-attack" class="wheel-group">
              <button id="btn-dribble" class="wheel-btn" data-label="Dribble">
                <span class="icon">🏃</span>
              </button>
              <button id="btn-pass" class="wheel-btn" data-label="Pass">
                <span class="icon">🎯</span>
              </button>
              <button id="btn-shoot" class="wheel-btn" data-label="Shoot">
                <span class="icon">⚽</span>
              </button>
            </div>
            <div id="btn-group-defend" class="wheel-group hidden">
              <button id="btn-press" class="wheel-btn" data-label="Press">
                <span class="icon">💥</span>
              </button>
              <button id="btn-block" class="wheel-btn" data-label="Block">
                <span class="icon">🛡️</span>
              </button>
            </div>
            <!-- Dynamic Label Display -->
            <div id="wheel-hover-label">Action</div>
          </div>
        </div>
      </footer>

      <div id="field-minimap-v2"></div>

      <!-- Overlays -->
      <div id="goal-notification" class="hidden">
        <div class="goal-stripe"></div>
        <h1 class="goal-text">GOAL!</h1>
      </div>

      <div id="game-over-overlay" class="overlay hidden">
        <h1>Match Over</h1>
        <p id="match-result-text"></p>
        <button id="btn-restart" class="btn-primary">Play Again</button>
      </div>
      
      <div id="kickoff-overlay" class="overlay">
        <h1>Beachballers</h1>
        <p>Ready for Kickoff?</p>
        <button id="btn-kickoff" class="btn-primary">Start Match</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
